syntax = "proto3";

package archetect;

import "google/protobuf/empty.proto";

service ArchetectService {
    rpc StreamingApi (stream ClientMessage) returns (stream ScriptMessage);
    // Phase 1 of federated-catalog. List catalog entries at a path
    // (empty path = root). Eagerly returns the full subtree so a
    // single RPC covers common browse workflows.
    rpc BrowseCatalog (BrowseCatalogRequest) returns (BrowseCatalogResponse);
    // AND-semantics full-text search across the server's catalog.
    rpc SearchCatalog (SearchCatalogRequest) returns (SearchCatalogResponse);
    // Derive an archetype's interface server-side by probing its script
    // (writes discarded, exec forbidden): prompt envelopes, consulted
    // switches, batch/interactive classification.
    rpc DescribeArchetype (DescribeArchetypeRequest) returns (DescribeArchetypeResponse);
}

message DescribeArchetypeRequest {
    // Catalog leaf path on this server (e.g. "services/grpc").
    string path = 1;
    // Fork select/confirm branches to map conditional prompts and
    // compute the batch/interactive classification.
    bool explore = 2;
}

message DescribeArchetypeResponse {
    // The derived interface, JSON-encoded — the same shape
    // `archetect interface --json` and the MCP `describe` tool emit.
    // JSON keeps the wire stable while the interface schema evolves;
    // a typed message can follow once the shape settles.
    string interface_json = 1;
}

message BrowseCatalogRequest {
    string path = 1;
}

message BrowseCatalogResponse {
    repeated CatalogIndexEntry entries = 1;
}

message SearchCatalogRequest {
    string query = 1;
    bool include_hidden = 2;
}

message SearchCatalogResponse {
    repeated CatalogIndexEntry results = 1;
}

enum CatalogEntryKind {
    CATALOG_ENTRY_KIND_UNSPECIFIED = 0;
    CATALOG_ENTRY_KIND_GROUP = 1;
    CATALOG_ENTRY_KIND_LEAF = 2;
}

message CatalogIndexEntry {
    string path = 1;
    string name = 2;
    string description = 3;
    CatalogEntryKind kind = 4;
    bool is_archetype = 5;
    bool has_source = 6;
    bool show = 7;
    repeated CatalogIndexEntry children = 8;
}

message PromptForText {
    string message = 1;
    optional string key = 2;
    optional string default = 3;
    optional uint32 min = 4;
    optional uint32 max = 5;
    optional string help = 6;
    optional string placeholder = 7;
    bool optional = 8;
}

message PromptForInt {
    string message = 1;
    optional string key = 2;
    optional int64 default = 3;
    optional int64 min = 4;
    optional int64 max = 5;
    optional string help = 6;
    optional string placeholder = 7;
    bool optional = 8;
}

message PromptForBool {
    string message = 1;
    optional string key = 2;
    optional bool default = 3;
    optional string help = 4;
    optional string placeholder = 5;
    bool optional = 6;
}

message PromptForList {
    string message = 1;
    optional string key = 2;
    optional Array defaults = 3;
    optional string help = 4;
    optional string placeholder = 5;
    optional uint32 min_items = 6;
    optional uint32 max_items = 7;
    bool optional = 8;
}

message PromptForSelect {
    string message = 1;
    optional string key = 2;
    repeated string options = 3;
    optional string default = 4;
    optional string help = 5;
    optional string placeholder = 6;
    optional uint32 page_size = 7;
    bool optional = 8;
    bool allow_other = 9;
    optional string other_label = 10;
}

message PromptForMultiSelect {
    string message = 1;
    optional string key = 2;
    repeated string options = 3;
    optional Array defaults = 4;
    optional string help = 5;
    optional string placeholder = 6;
    optional uint32 min_items = 7;
    optional uint32 max_items = 8;
    optional uint32 page_size = 9;
    bool optional = 10;
}

message PromptForEditor {
    string message = 1;
    optional string key = 2;
    optional string default = 3;
    optional uint64 min = 4;
    optional uint64 max = 5;
    optional string help = 6;
    optional string placeholder = 7;
    bool optional = 8;
}

message Initialize {
    string answers_yaml = 1;
    repeated string switches = 2;
    repeated string use_defaults = 3;
    bool use_defaults_all = 4;
    string destination = 5;
    // Slash-separated catalog path to render (e.g. "services/grpc").
    // Empty = use the server's default catalog entry. Added for the
    // federated catalog design — see docs/plans/federated-catalog.md.
    string catalog_path = 6;
}

message Array {
    repeated string values = 1;
}

message CompleteSuccess {}

message CompleteError {
    string message = 1;
}

message WriteFile {
    string destination = 1;
    bytes contents = 2;
    ExistingFilePolicy existing_files = 3;
}

message WriteDirectory {
    string path = 1;
}

enum ExistingFilePolicy {
    EXISTING_FILE_POLICY_UNSPECIFIED = 0;
    EXISTING_FILE_POLICY_PRESERVE = 1;
    EXISTING_FILE_POLICY_OVERWRITE = 2;
    EXISTING_FILE_POLICY_PROMPT = 3;
    EXISTING_FILE_POLICY_ERROR = 4;
}

message ScriptMessage {
    oneof message {
        string log_trace = 1;
        string log_debug = 2;
        string log_info = 3;
        string log_warn = 4;
        string log_error = 6;
        string print = 7;
        string display = 8;
        PromptForText prompt_for_text = 9;
        PromptForInt prompt_for_int = 10;
        PromptForSelect prompt_for_select = 11;
        PromptForMultiSelect prompt_for_multi_select = 12;
        PromptForBool prompt_for_bool = 13;
        PromptForList prompt_for_list = 14;
        PromptForEditor prompt_for_editor = 15;
        CompleteSuccess complete_success = 16;
        CompleteError complete_error = 17;
        WriteFile write_file = 18;
        WriteDirectory write_directory = 19;
    }
}

message ClientMessage {
    oneof message {
        Initialize initialize = 1;
        string string = 2;
        int64 integer = 3;
        bool boolean = 4;
        string error = 5;
        Array array = 6;
        google.protobuf.Empty none = 7;
        google.protobuf.Empty abort = 8;
        google.protobuf.Empty ack = 9;
    }
}
