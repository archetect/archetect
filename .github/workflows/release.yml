name: Release

# Tag-driven release. Pushing a `vX.Y.Z` tag (on `main` for the 3.x line, or on
# `2.x` for the v2 maintenance line) builds, publishes a GitHub release, and
# updates the Homebrew tap. Version is derived from the tag.
#
# To cut a release, either:
#   - run the "Prepare Release" workflow (bumps Cargo.toml + pushes the tag), or
#   - bump the workspace version, commit, then `git tag vX.Y.Z && git push --tags`.
#
# Pre-release tags (e.g. v3.0.0-rc.1) are published as GitHub pre-releases and
# never marked --latest nor pushed to the main `archetect` Homebrew formula.

on:
  push:
    tags:
      - "v*"
  # Manual fallback: dispatch this workflow ON A TAG REF
  # (gh workflow run release.yml --ref vX.Y.Z) when the tag push didn't
  # trigger it — e.g. tags pushed by another workflow with the default
  # GITHUB_TOKEN, or a tag whose commit message carries [skip ci].
  # The version is derived from GITHUB_REF_NAME either way.
  workflow_dispatch:

permissions: write-all
concurrency:
  # Scope per tag so 2.x and 3.x releases (and any distinct tags) never block one
  # another. The Homebrew tap serializes its own updates via its own concurrency.
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BINARY_NAME: archetect
  BINARY_HOMEPAGE: "https://github.com/${{ github.repository }}"
  BINARY_DESCRIPTION: "Archetect"
  DOWNLOAD_PREFIX: "https://github.com/${{ github.repository }}/releases/download"
  DESTINATION_HOMEBREW_TAP: ${{ github.repository_owner }}/homebrew-tap
  ARCHETECT_DISPATCH_TOKEN: ${{ secrets.ARCHETECT_DISPATCH_TOKEN }}
  # The highest major version currently considered the "latest" line. A tag whose
  # major is >= this value updates the main `archetect` formula and is marked
  # --latest; lower majors are treated as maintenance releases. Bump at the next
  # major (v4) cutover.
  LATEST_MAJOR: "3"

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}                 # v3.0.0
      version: ${{ steps.v.outputs.version }}         # 3.0.0
      major: ${{ steps.v.outputs.major }}             # 3
      prerelease: ${{ steps.v.outputs.prerelease }}   # true | false
      latest: ${{ steps.v.outputs.latest }}           # true | false
      update_main: ${{ steps.v.outputs.update_main }} # true | false
      channel: ${{ steps.v.outputs.channel }}         # stable-latest | maintenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version & channel
        id: v
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"

          if [[ "$VERSION" == *-* ]]; then PRERELEASE=true; else PRERELEASE=false; fi

          if [[ "$PRERELEASE" == "false" && "$MAJOR" -ge "${LATEST_MAJOR}" ]]; then
            LATEST=true
            UPDATE_MAIN=true
            CHANNEL=stable-latest
          else
            LATEST=false
            UPDATE_MAIN=false
            CHANNEL=maintenance
          fi

          # Sanity gate: the workspace version must match the tag's BASE version
          # (the part before any -prerelease suffix). A v3.0.0-rc.1 tag validates the
          # upcoming 3.0.0 whose Cargo.toml already reads 3.0.0; a final v3.0.0 tag
          # must match exactly. Reads the first top-level `version = "..."` (the
          # [workspace.package] entry).
          BASE_VERSION="${VERSION%%-*}"
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$CARGO_VERSION" != "$BASE_VERSION" ]]; then
            echo "::error::Tag ${TAG} (base version ${BASE_VERSION}) does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

          echo "Releasing ${TAG} | major=${MAJOR} prerelease=${PRERELEASE} latest=${LATEST} channel=${CHANNEL}"
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "major=${MAJOR}"
            echo "prerelease=${PRERELEASE}"
            echo "latest=${LATEST}"
            echo "update_main=${UPDATE_MAIN}"
            echo "channel=${CHANNEL}"
          } >> "$GITHUB_OUTPUT"

      # Release gate: tests must pass before a draft release is created or any
      # platform build runs. A red test therefore cannot produce a published
      # release, regardless of branch protection or which commit was tagged.
      - name: Enable Rust Dependency Caching
        uses: Swatinem/rust-cache@v2

      - name: Test (release gate)
        shell: bash
        run: cargo test

      - name: Create Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.v.outputs.tag }}
          PRERELEASE: ${{ steps.v.outputs.prerelease }}
        shell: bash
        run: |
          PRE_FLAG=""
          if [[ "$PRERELEASE" == "true" ]]; then PRE_FLAG="--prerelease"; fi
          gh release create "${TAG}" --draft --verify-tag --title "${TAG}" ${PRE_FLAG}

  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    needs: [setup]
    strategy:
      # Build every platform even if one fails, so a single run surfaces all
      # platform-specific failures instead of cancelling siblings.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x86_64

    outputs:
      linux-arm64_archive: ${{ steps.create-archive.outputs.linux-arm64_archive }}
      linux-arm64_sha256: ${{ steps.create-archive.outputs.linux-arm64_sha256 }}
      linux-x86_64_archive: ${{ steps.create-archive.outputs.linux-x86_64_archive }}
      linux-x86_64_sha256: ${{ steps.create-archive.outputs.linux-x86_64_sha256 }}
      macos-arm64_archive: ${{ steps.create-archive.outputs.macos-arm64_archive }}
      macos-arm64_sha256: ${{ steps.create-archive.outputs.macos-arm64_sha256 }}

    env:
      VERSION: ${{ needs.setup.outputs.tag }}

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Build ${{ matrix.platform }}-${{ matrix.arch }}
        shell: bash
        run: |
          echo "Building ${BINARY_NAME} for ${{ matrix.platform }}-${{ matrix.arch }}"

      - name: Enable Rust Dependency Caching
        uses: Swatinem/rust-cache@v2

      - name: Build Binary
        shell: bash
        run: |
          cargo build --release
          if [ "${{ matrix.platform }}" = "windows" ]; then
            binary_path="target/release/${BINARY_NAME}.exe"
          else
            binary_path="target/release/${BINARY_NAME}"
          fi
          echo "BINARY_PATH=$binary_path" >> $GITHUB_ENV

      - name: Strip Binary
        if: matrix.platform == 'linux' || matrix.platform == 'macos'
        run: strip "$BINARY_PATH"

      - name: Create Release Archive
        id: create-archive
        shell: bash
        run: |
          archive_prefix="${BINARY_NAME}-${VERSION}-${{matrix.platform}}-${{matrix.arch}}"
          mkdir -p "${archive_prefix}"
          cp "$BINARY_PATH" "$archive_prefix"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            archive=${archive_prefix}.zip
            archive_sum=${archive_prefix}.zip.sha256
            7z a "${archive}" "${archive_prefix}"
            certutil -hashfile "${archive}" SHA256 > "${archive_sum}"
          else
            archive=${archive_prefix}.tar.gz
            archive_sum=${archive_prefix}.tar.gz.sha256
            tar czf "${archive}" "${archive_prefix}"
            shasum -a 256 "${archive}" > "${archive_sum}"
            echo "${{ matrix.platform }}-${{ matrix.arch}}_archive=${VERSION}/${archive}" >> $GITHUB_OUTPUT
            echo "${{ matrix.platform }}-${{ matrix.arch}}_sha256=$(cat $archive_sum | awk '{print $1}')" >> $GITHUB_OUTPUT
          fi
          echo "ARCHIVE=${archive}" >> $GITHUB_ENV
          echo "ARCHIVE_PREFIX=${archive_prefix}" >> $GITHUB_ENV
          echo "ARCHIVE_SUM=${archive_sum}" >> $GITHUB_ENV

      - name: Upload Release Archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${VERSION}" "${ARCHIVE}" "${ARCHIVE_SUM}"

      # Windows specific steps
      - name: Create Windows Installer
        if: matrix.platform == 'windows'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: pkg/windows/Archetect.iss
          options: /O+

      - name: Upload Windows Installer
        if: matrix.platform == 'windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${VERSION}" "target\${{ env.ARCHIVE_PREFIX }}-installer.exe"

  post-release:
    name: Post Release
    runs-on: ubuntu-latest
    needs: [setup, build]
    env:
      VERSION: ${{ needs.setup.outputs.tag }}
    steps:
      - name: Finalize Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          LATEST: ${{ needs.setup.outputs.latest }}
        shell: bash
        run: |
          gh release edit "${VERSION}" --draft=false
          if [[ "$LATEST" == "true" ]]; then
            gh release edit "${VERSION}" --latest
          else
            # Explicitly keep maintenance/prerelease tags off "Latest" so they never
            # demote the current stable (GitHub otherwise auto-marks the newest).
            gh release edit "${VERSION}" --latest=false
          fi

  update_homebrew_formula:
    name: Update Homebrew Formula
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event to ${{ env.DESTINATION_HOMEBREW_TAP }}
        uses: ph-fritsche/action-dispatch@v1
        with:
          token: ${{ env.ARCHETECT_DISPATCH_TOKEN }}
          type: repository
          repo: ${{ env.DESTINATION_HOMEBREW_TAP }}
          ident: update-formula
          payload: |
            {
              "binary": "${{ env.BINARY_NAME }}",
              "homepage": "${{ env.BINARY_HOMEPAGE }}",
              "description": "${{ env.BINARY_DESCRIPTION }}",
              "version": "${{ needs.setup.outputs.version }}",
              "major": "${{ needs.setup.outputs.major }}",
              "channel": "${{ needs.setup.outputs.channel }}",
              "update_main": "${{ needs.setup.outputs.update_main }}",
              "prerelease": "${{ needs.setup.outputs.prerelease }}",
              "builds": {
                "linux-arm64_archive": "${{ env.DOWNLOAD_PREFIX }}/${{ needs.build.outputs.linux-arm64_archive }}",
                "linux-arm64_sha256": "${{ needs.build.outputs.linux-arm64_sha256 }}",
                "linux-x86_64_archive": "${{ env.DOWNLOAD_PREFIX }}/${{ needs.build.outputs.linux-x86_64_archive }}",
                "linux-x86_64_sha256": "${{ needs.build.outputs.linux-x86_64_sha256 }}",
                "macos-arm64_archive": "${{ env.DOWNLOAD_PREFIX }}/${{ needs.build.outputs.macos-arm64_archive }}",
                "macos-arm64_sha256": "${{ needs.build.outputs.macos-arm64_sha256 }}"
              }
            }
